---
name: Terraform Infra

"on":
  push:
    branches:
      - main
      - feat-ci-cd
    paths:
      - .github/workflows/infra.yml
      - infra/terraform/**
  pull_request:
    paths:
      - .github/workflows/infra.yml
      - infra/terraform/**

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-infra-main
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  ARM_USE_OIDC: "true"
  ARM_USE_AZUREAD: "true"
  APPGW_CERTIFICATE_NAME: "appgw-ssl-cert"
  TF_STATE_STORAGE_ACCOUNT: "tfstateproject2g6"
  TF_STATE_CONTAINER: "tfstate"
  TF_STATE_BLOB_KEY: "terraform.tfstate"
  ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID != '' && vars.ARM_CLIENT_ID || secrets.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID != '' && vars.ARM_TENANT_ID || secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID != '' && vars.ARM_SUBSCRIPTION_ID || secrets.ARM_SUBSCRIPTION_ID }}
  TF_VAR_admin_ssh_public_key: ${{ secrets.ADMIN_SSH_PUBLIC_KEY }}
  TF_VAR_sql_admin_password: ${{ secrets.SQL_ADMIN_PASSWORD }}
  TF_VAR_sonar_db_password: ${{ secrets.SONAR_DB_PASSWORD }}
  TF_VAR_admin_source_cidr: ${{ vars.ADMIN_SOURCE_CIDR != '' && vars.ADMIN_SOURCE_CIDR || '0.0.0.0/0' }}
  TF_VAR_appgw_hostname: ${{ vars.APPGW_HOSTNAME }}
  TF_VAR_appgw_ssl_certificate_name: "appgw-ssl-cert"

jobs:
  plan:
    name: Terraform Plan
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check Azure OIDC variables
        run: |
          test -n "${{ vars.ARM_CLIENT_ID || secrets.ARM_CLIENT_ID }}" || (echo "ARM_CLIENT_ID is missing" && exit 1)
          test -n "${{ vars.ARM_TENANT_ID || secrets.ARM_TENANT_ID }}" || (echo "ARM_TENANT_ID is missing" && exit 1)
          test -n "${{ vars.ARM_SUBSCRIPTION_ID || secrets.ARM_SUBSCRIPTION_ID }}" || (echo "ARM_SUBSCRIPTION_ID is missing" && exit 1)
          echo "Azure OIDC variables are present"

      - name: Log in to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID != '' && vars.ARM_CLIENT_ID || secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID != '' && vars.ARM_TENANT_ID || secrets.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID != '' && vars.ARM_SUBSCRIPTION_ID || secrets.ARM_SUBSCRIPTION_ID }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.9"

      - name: Check remote state lock
        working-directory: .
        run: bash ./scripts/check_terraform_state_lock.sh

      - name: Check formatting
        run: terraform fmt -check -recursive

      - name: Initialize Terraform
        run: terraform init -input=false

      - name: Enable HTTPS automatically when the Key Vault certificate already exists
        run: |
          KEY_VAULT_NAME="$(terraform output -raw key_vault_name 2>/dev/null || true)"
          if [ -n "$KEY_VAULT_NAME" ] && az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name "$APPGW_CERTIFICATE_NAME" --query id --output tsv >/dev/null 2>&1; then
            echo "TF_VAR_appgw_enable_https=true" >> "$GITHUB_ENV"
          else
            echo "TF_VAR_appgw_enable_https=false" >> "$GITHUB_ENV"
          fi

      - name: Validate Terraform
        run: terraform validate

      - name: Check remote state lock before plan
        working-directory: .
        run: bash ./scripts/check_terraform_state_lock.sh

      - name: Create Terraform plan
        run: terraform plan -input=false -lock-timeout=300s -out=tfplan

      - name: Upload Terraform plan artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: infra/terraform/tfplan
          if-no-files-found: error

  apply:
    name: Terraform Apply
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID != '' && vars.ARM_CLIENT_ID || secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID != '' && vars.ARM_TENANT_ID || secrets.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID != '' && vars.ARM_SUBSCRIPTION_ID || secrets.ARM_SUBSCRIPTION_ID }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.9"

      - name: Check remote state lock
        working-directory: .
        run: bash ./scripts/check_terraform_state_lock.sh

      - name: Download Terraform plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: infra/terraform

      - name: Initialize Terraform
        run: terraform init -input=false

      - name: Enable HTTPS automatically when the Key Vault certificate already exists
        run: |
          KEY_VAULT_NAME="$(terraform output -raw key_vault_name 2>/dev/null || true)"
          if [ -n "$KEY_VAULT_NAME" ] && az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name "$APPGW_CERTIFICATE_NAME" --query id --output tsv >/dev/null 2>&1; then
            echo "TF_VAR_appgw_enable_https=true" >> "$GITHUB_ENV"
          else
            echo "TF_VAR_appgw_enable_https=false" >> "$GITHUB_ENV"
          fi

      - name: Check remote state lock before apply
        working-directory: .
        run: bash ./scripts/check_terraform_state_lock.sh

      - name: Apply Terraform plan
        run: terraform apply -input=false -lock-timeout=300s -auto-approve tfplan
