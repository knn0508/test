name: Frontend CI/CD

"on":
  push:
    branches:
      - main
      - feat-ci-cd
    paths:
      - .github/workflows/frontend.yml
      - frontend/**
  pull_request:
    paths:
      - .github/workflows/frontend.yml
      - frontend/**

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        run: npm test -- --run

      - name: Build frontend
        run: npm run build

  scan-image-push:
    env:
      ARM_USE_AZUREAD: "true"
      ARM_USE_CLI: "true"
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on:
      - self-hosted
      - ops-runner
      - azure-private
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.9"

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        with:
          projectBaseDir: frontend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Log in to Azure with the ops runner managed identity
        working-directory: .
        run: az login --identity

      - name: Initialize Terraform to read shared outputs
        working-directory: .
        run: terraform -chdir=infra/terraform init -input=false -reconfigure

      - name: Load ACR details from Terraform outputs
        working-directory: .
        run: |
          echo "ACR_NAME=$(terraform -chdir=infra/terraform output -raw acr_name)" >> "$GITHUB_ENV"
          echo "ACR_REGISTRY=$(terraform -chdir=infra/terraform output -raw acr_login_server)" >> "$GITHUB_ENV"

      - name: Build and push frontend image to ACR
        working-directory: .
        env:
          IMAGE_NAME: frontend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          az acr login --name "$ACR_NAME"
          docker build -f frontend/Dockerfile -t "$ACR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG" frontend
          docker push "$ACR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG"
          docker tag "$ACR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG" "$ACR_REGISTRY/$IMAGE_NAME:latest"
          docker push "$ACR_REGISTRY/$IMAGE_NAME:latest"

  deploy:
    env:
      ARM_USE_AZUREAD: "true"
      ARM_USE_CLI: "true"
    needs: scan-image-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on:
      - self-hosted
      - ops-runner
      - azure-private
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.9"

      - name: Log in to Azure with the ops runner managed identity
        run: az login --identity

      - name: Initialize Terraform for Ansible inventory generation
        run: terraform -chdir=infra/terraform init -input=false -reconfigure

      - name: Install required Ansible collections
        run: ansible-galaxy collection install -r config/ansible/requirements.yml

      - name: Deploy frontend via Ansible
        env:
          ANSIBLE_USE_BASTION: "false"
          IMAGE_TAG: ${{ github.sha }}
        run: ansible-playbook config/ansible/site.yml --limit "localhost,frontend_vms"
