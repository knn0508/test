name: Backend CI/CD Pipeline

"on":
  push:
    branches:
      - main
      - feat-ci-cd
    paths:
      - .github/workflows/backend.yml
      - backend/**
  pull_request:
    paths:
      - .github/workflows/backend.yml
      - backend/**

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Build and test backend
        run: mvn verify -B

  scan-image-push:
    env:
      ARM_USE_AZUREAD: "true"
      ARM_USE_CLI: "true"
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on:
      - self-hosted
      - ops-runner
      - azure-private
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Run SonarQube scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn -B -DskipTests package sonar:sonar \
            -Dsonar.projectKey=backend \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.login="$SONAR_TOKEN"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.9"

      - name: Log in to Azure with the ops runner managed identity
        working-directory: .
        run: az login --identity

      - name: Initialize Terraform to read shared outputs
        working-directory: .
        run: terraform -chdir=infra/terraform init -input=false -reconfigure

      - name: Load ACR details from Terraform outputs
        working-directory: .
        run: |
          echo "ACR_NAME=$(terraform -chdir=infra/terraform output -raw acr_name)" >> "$GITHUB_ENV"
          echo "ACR_REGISTRY=$(terraform -chdir=infra/terraform output -raw acr_login_server)" >> "$GITHUB_ENV"

      - name: Build and push backend image to ACR
        working-directory: .
        env:
          IMAGE_NAME: backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          az acr login --name "$ACR_NAME"
          docker build -f backend/Dockerfile -t "$ACR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG" backend
          docker push "$ACR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG"
          docker tag "$ACR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG" "$ACR_REGISTRY/$IMAGE_NAME:latest"
          docker push "$ACR_REGISTRY/$IMAGE_NAME:latest"

  deploy:
    env:
      ARM_USE_AZUREAD: "true"
      ARM_USE_CLI: "true"
    needs: scan-image-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on:
      - self-hosted
      - ops-runner
      - azure-private
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.9"

      - name: Log in to Azure with the ops runner managed identity
        run: az login --identity

      - name: Initialize Terraform for Ansible inventory generation
        run: terraform -chdir=infra/terraform init -input=false -reconfigure

      - name: Install required Ansible collections
        run: ansible-galaxy collection install -r config/ansible/requirements.yml

      - name: Deploy backend via Ansible
        env:
          ANSIBLE_USE_BASTION: "false"
          IMAGE_TAG: ${{ github.sha }}
          BACKEND_CORS_ALLOWED_ORIGINS: ${{ vars.BACKEND_CORS_ALLOWED_ORIGINS }}
        run: ansible-playbook config/ansible/site.yml --limit "localhost,backend_vms"
