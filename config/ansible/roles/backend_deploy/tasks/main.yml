- name: Validate backend deployment variables
  ansible.builtin.assert:
    that:
      - key_vault_name | length > 0
      - key_vault_sql_password_secret_name | length > 0
      - key_vault_app_insights_secret_name | length > 0
      - sql_host | length > 0
      - sql_database | length > 0
      - sql_username | length > 0
      - cors_allowed_origins | length > 0
    fail_msg: "Terraform outputs and Key Vault secret names must be available before deploying the backend."

- name: Read SQL password from Key Vault
  ansible.builtin.command:
    argv:
      - az
      - keyvault
      - secret
      - show
      - --vault-name
      - "{{ key_vault_name }}"
      - --name
      - "{{ key_vault_sql_password_secret_name }}"
      - --query
      - value
      - --output
      - tsv
  register: backend_sql_password_secret
  changed_when: false
  no_log: true

- name: Read Application Insights connection string from Key Vault
  ansible.builtin.command:
    argv:
      - az
      - keyvault
      - secret
      - show
      - --vault-name
      - "{{ key_vault_name }}"
      - --name
      - "{{ key_vault_app_insights_secret_name }}"
      - --query
      - value
      - --output
      - tsv
  register: backend_app_insights_secret
  changed_when: false
  no_log: true

- name: Cache backend secret values
  ansible.builtin.set_fact:
    backend_sql_password: "{{ backend_sql_password_secret.stdout }}"
    backend_ai_connection_string: "{{ backend_app_insights_secret.stdout }}"
  no_log: true

- name: Pull backend image from ACR
  community.docker.docker_image:
    name: "{{ backend_image }}"
    source: pull
    force_source: true

- name: Remove any previous backend container
  community.docker.docker_container:
    name: backend
    state: absent

- name: Run backend container
  community.docker.docker_container:
    name: backend
    image: "{{ backend_image }}"
    state: started
    restart_policy: unless-stopped
    ports:
      - "8080:8080"
    env:
      SPRING_PROFILES_ACTIVE: "azure"
      DB_HOST: "{{ sql_host }}"
      DB_PORT: "1433"
      DB_NAME: "{{ sql_database }}"
      DB_USERNAME: "{{ sql_username }}"
      DB_PASSWORD: "{{ backend_sql_password }}"
      DB_DRIVER: "com.microsoft.sqlserver.jdbc.SQLServerDriver"
      CORS_ALLOWED_ORIGINS: "{{ cors_allowed_origins }}"
      APPLICATIONINSIGHTS_CONNECTION_STRING: "{{ backend_ai_connection_string }}"
