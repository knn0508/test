---
- name: Install apt prerequisites for Docker and Azure CLI
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - python3-docker
    state: present
    update_cache: true

- name: Create apt keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Azure CLI GPG key
  ansible.builtin.get_url:
    url: https://packages.microsoft.com/keys/microsoft.asc
    dest: /etc/apt/keyrings/microsoft.asc
    mode: "0644"

- name: Add Docker repository for the current Ubuntu release
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ ansible_distribution_release }} stable
    state: present

- name: Add Azure CLI repository for the current Ubuntu release
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }}
      signed-by=/etc/apt/keyrings/microsoft.asc]
      https://packages.microsoft.com/repos/azure-cli/
      {{ ansible_distribution_release }} main
    state: present

- name: Install Docker Engine and Azure CLI
  ansible.builtin.apt:
    name: [azure-cli, docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin]
    state: present
    update_cache: true

- name: Add azureuser to docker group
  ansible.builtin.user:
    name: azureuser
    groups: docker
    append: true

- name: Ensure Docker is started and enabled
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Log in to Azure with the VM managed identity
  ansible.builtin.command: az login --identity
  changed_when: false

- name: Log in to ACR with the VM managed identity
  ansible.builtin.command: az acr login --name {{ acr_name }}
  changed_when: false
